services:
  mysql:
    image: mysql:8.4
    container_name: todotasks_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todotasks}
      MYSQL_USER: ${MYSQL_USER:-todotasks}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todotasks_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: todotasks_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-todotasks}
      DB_USER: ${MYSQL_USER:-todotasks}
      DB_PASSWORD: ${MYSQL_PASSWORD:-todotasks_password}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://cesarvargas.tech/todotaskdev}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /todotaskdev/api
        VITE_BASE_PATH: /todotaskdev/
    container_name: todotasks_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: todotasks_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  uploads_data:
